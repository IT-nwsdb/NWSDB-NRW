<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NRW Region & Location Selector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="text-center">
      <h1 class="brand">NRW</h1>
      <p class="loading-text">Loading...</p>
    </div>
  </div>

  <main id="mainContent" class="d-none">
    <div class="container-fluid app-shell py-3 py-md-4 px-3 px-md-4">
      <div class="row g-0">
        <div class="col-12">
          <div id="appCard" class="app-card shadow-sm">
            <div id="heroHeader" class="text-center mb-4">
              <h1 class="app-title">NRW Region &amp; Location Selector</h1>
              <p class="app-subtitle mb-0"></p>
            </div>

            <div class="selector-box">
              <div class="row g-3 align-items-end">
                <div class="col-md-4">
                  <label class="form-label" for="regionSelect">Region</label>
                  <select id="regionSelect" class="form-select">
                    <option value="">Select region</option>
                  </select>
                </div>
                <div class="col-md-5">
                  <label class="form-label" for="locationSelect">Location</label>
                  <select id="locationSelect" class="form-select" disabled>
                    <option value="">Select location</option>
                  </select>
                  <div id="locationCount" class="small text-muted mt-2"></div>
                </div>
                <div class="col-md-3 d-grid">
                  <button id="nextBtn" class="btn btn-primary" disabled>Next</button>
                </div>
              </div>
            </div>

            <div id="selectionInfo" class="selection-strip d-none mt-3">
              <div class="selection-pill"><span>Region</span><strong id="selectedRegionText">-</strong></div>
              <div class="selection-pill"><span>Location</span><strong id="selectedLocationText">-</strong></div>
              <div class="selection-pill"><span>Sheet</span><strong id="selectedSheetText">Pending</strong></div>
            </div>

            <div id="emptyState" class="empty-state mt-3">
              <p class="mb-0">Select a region and location, then click <strong>Next</strong>.</p>
            </div>

            <div id="tableSection" class="d-none mt-3">
              <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                  <h2 class="section-title mb-1">Production Table</h2>
                  <p id="tableNote" class="small text-muted mb-0">Headers match the selected spreadsheet page.</p>
                </div>
                <div class="d-flex gap-2">
                  <button id="addRowBtn" class="btn btn-outline-primary btn-sm">+ Row</button>
                  <button id="saveBtn" class="btn btn-success btn-sm">Save</button>
                  <button id="resetBtn" class="btn btn-outline-secondary btn-sm">Reset</button>
                </div>
              </div>

              <div class="table-wrap mt-3">
                <div class="table-responsive">
                  <table id="dataTable" class="table table-bordered align-middle mb-0">
                    <thead></thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
